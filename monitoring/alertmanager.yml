global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'category']
  group_wait: 10s
  group_interval: 10m
  repeat_interval: 3h
  receiver: 'default-receiver'

  routes:
    # Critical alerts (FraudRecallDrop) → trigger GitHub Actions retraining
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true

    # Warning alerts (FeatureDriftDetected) → also trigger retraining
    - match:
        severity: warning
        alertname: FeatureDriftDetected
      receiver: 'drift-receiver'
      continue: true

receivers:
  - name: 'default-receiver'
    # Visible in AlertManager UI at http://localhost:9093

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://fraud-api:8000/alert/webhook'
        send_resolved: false
        http_config:
          follow_redirects: true

  - name: 'drift-receiver'
    webhook_configs:
      - url: 'http://fraud-api:8000/alert/webhook'
        send_resolved: false
        http_config:
          follow_redirects: true
