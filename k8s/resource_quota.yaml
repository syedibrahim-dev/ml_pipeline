apiVersion: v1
kind: ResourceQuota
metadata:
  name: fraud-detection-quota
  namespace: fraud-detection
spec:
  hard:
    # CPU quotas per pipeline run
    requests.cpu: "4"
    limits.cpu: "8"
    # Memory quotas per pipeline run
    requests.memory: 8Gi
    limits.memory: 16Gi
    # Storage
    requests.storage: 20Gi
    persistentvolumeclaims: "5"
    # Pod / Service limits
    pods: "20"
    services: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: fraud-detection-limits
  namespace: fraud-detection
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 2Gi
      defaultRequest:
        cpu: "0.5"
        memory: 512Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: "0.1"
        memory: 64Mi
